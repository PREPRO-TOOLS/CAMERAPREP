        body {

            background: black;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-y: auto;
            padding-bottom: 80px;
        }
        
        input, button {
            font-family: 'Futura', sans-serif;
            background: white;
            color: black;
            padding: 10px;
            border: none;
            margin: 10px;
            cursor: pointer;
        }

        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
        }

        #loginPage {

            flex-direction: column;
            justify-content: center;
            align-items: center;

            width: 100%;
            max-width: 800px;
            text-align: center;
            margin: 20px auto;
            padding: 15px;
            position: relative;
            z-index: 1;
        }

        #listBuilder {
            padding: 20px;
            margin-top: 20px;
        }

        #itemList, #selectedItems {
            max-height: 300px;
            overflow-y: auto;
            margin: 10px 0;
            padding: 10px;
        }

        .categories-container {
            margin-top: 30px;
        }

        .project-page-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            min-height: 100vh;
            padding: 20px;
            overflow: visible;
        }

        .sidebar {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-right: 1px solid #333;
            overflow-y: auto;
            max-height: calc(100vh - 40px);

        .main-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
            overflow: visible;
            height: auto !important;
            padding-bottom: 100px;
        }

        .pdf-preview {
            background: white;
            color: black;
            padding: 40px;
            width: 816px;
            margin: 20px auto 100px auto;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            text-align: left;
            position: relative;
            display: block;
            height: auto !important;
            min-height: auto !important;
        }

        #selectedItems {
            width: 100%;
            position: relative;
            z-index: 2;
            height: auto !important;
            min-height: auto !important;
            max-height: none !important;
        }

        /* Category Headers */
        #selectedItems h3 {

            padding-bottom: 5px;
            border-bottom: 1px solid #ccc;
            width: 100%;
            position: relative;
            font-size: 21px;
            font-weight: bold;
        }

        /* Individual Items */
        #selectedItems li {
            margin: 5px 0 !important;
            padding: 5px 0;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Container Fixes */
        .main-content {
            height: auto !important;
            min-height: 0 !important;
            overflow: visible !important;
            padding-bottom: 80px; /* Space for generate button */

        /* Remove any nested scrolling */
        .pdf-preview > *, 
        #selectedItems > *,
        .main-content > * {
            overflow: visible !important;
            height: auto !important;
            min-height: 0 !important;
        }

        /* Keep generate button always visible */
        .generate-pdf-button {
            position: relative;
            margin: 40px auto;
            display: block;
            background: white;
            color: black;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);

        .pdf-preview > *, 
        #selectedItems > *,
        .main-content > * {
            overflow: visible !important;
            height: auto !important;
            min-height: 0 !important;
        }

            position: relative;
            z-index: 2;
            height: auto;
            min-height: 0;
            margin-bottom: 30px;
        }

        #selectedItems h3 {
            margin: 30px 0 15px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #ccc;
            width: 100%;
        }

        #selectedItems li {
            margin: 10px 0;
            padding: 5px 0;
        }

        /* Remove any nested scrolling containers */
        .pdf-preview > *, #selectedItems > * {
            overflow: visible;
        }

        /* Ensure proper spacing for items */

            font-size: 21px;
            font-weight: bold;
            margin: 25px 0 15px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #ccc;
            width: 100%;
            position: relative;
        }

        #selectedItems li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 8px 0;
            padding: 5px 0;
            width: 100%;
            position: relative;

        .item-content {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .quantity-input {
            width: 60px;
            padding: 5px;
            margin: 0 15px;
        }

        .remove-button {
            padding: 2px 8px;
            border-radius: 50%;
            background-color: #ff4444;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* Create paper sheet effect */
        .pdf-preview::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            z-index: -1;
        }

        /* Add page break visual indicator */
        .page-break {
            border-top: 2px dashed #ccc;
            margin: 40px -60px;
            position: relative;
        }

        .page-break::after {
            content: 'Page Break';
            position: absolute;
            right: 20px;
            top: -10px;
            background: #f0f0f0;
            padding: 0 10px;
            font-size: 12px;
            color: #999;
        }

        /* Add visual page guides */
        .page-guide {
            position: absolute;
            right: 10px;
            top: 10px;
            background: #f0f0f0;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            color: #666;
        }

        #categories li {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        #categories button {
            width: 100%;
            margin: 5px 0;
            background: #333;
            color: white;
        }

        #itemList {
            text-align: left;
            margin-top: 10px;
        }

        #itemList li {
            padding: 8px;
            border-bottom: 1px solid #333;
        }

        .category-item {
            border-bottom: 1px solid #333;
            position: relative;
            z-index: 5;
        }

        .category-item > div:first-child {
            padding: 10px;
            cursor: pointer;
        }

        .category-item > div:first-child:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .subcategories {
            margin-left: 20px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;

        .subcategories button {

            text-align: left;
            margin-bottom: 5px;

            color: #000;          /* Black text */

            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Futura', sans-serif;
            font-size: 14px;

        .subcategories button:hover {

        #selectedItems h3 {

            margin: 10px 0;

            flex-direction: column;

            position: relative;
            display: inline-block;

            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 10px;
        }

            display: none;
            position: absolute;
            background-color: black;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }

        .dropdown-content a:hover {
            background-color: #333;

            display: block;

        function updateSelectedList() {
            const selectedList = document.getElementById('selectedItems');
            const projectTitle = document.getElementById('projectTitle').value || '';
            document.getElementById('previewTitle').textContent = projectTitle;
            selectedList.innerHTML = '';
            
            // Group items by category for display
            const categorizedItems = {
                'Camera': [],
                'Lenses': [],
                'AKS': []
            };
            
            // Sort items into categories
            selectedItemsList.forEach(item => {
                if (items.Camera.Digital.includes(item.name)) {
                    categorizedItems.Camera.push(item);
                } else if (Object.values(items.Lenses).some(categoryItems => categoryItems.includes(item.name))) {
                    categorizedItems.Lenses.push(item);
                } else if (Object.values(items.AKS).some(categoryItems => categoryItems.includes(item.name))) {
                    categorizedItems.AKS.push(item);
                }
            });
            
            // Display items by category
            Object.entries(categorizedItems).forEach(([category, categoryItems]) => {
                if (categoryItems.length > 0) {
                    // Add category header
                    const categoryHeader = document.createElement('h3');
                    categoryHeader.style.borderBottom = '1px solid #ccc';
                    categoryHeader.style.paddingBottom = '5px';
                    categoryHeader.style.marginTop = '20px';
                    categoryHeader.textContent = category;
                    selectedList.appendChild(categoryHeader);
                    
                    // Add items under the category
                    categoryItems.forEach(item => {
                        const li = document.createElement('li');
                        
                        const itemContent = document.createElement('div');
                        itemContent.className = 'item-content';
                        
                        const itemText = document.createElement('span');
                        itemText.textContent = item.name;
                        
                        const quantityInput = document.createElement('input');
                        quantityInput.type = 'number';
                        quantityInput.min = '1';
                        quantityInput.value = item.quantity;
                        quantityInput.className = 'quantity-input';
                        quantityInput.addEventListener('change', (e) => {
                            item.quantity = parseInt(e.target.value) || 1;
                        });
                        
                        const removeButton = document.createElement('button');
                        removeButton.textContent = '×';
                        removeButton.className = 'remove-button';
                        removeButton.onclick = (e) => {
                            e.stopPropagation();
                            removeFromSelected(item.name);
                        };
                        
                        itemContent.appendChild(itemText);
                        itemContent.appendChild(quantityInput);
                        li.appendChild(itemContent);
                        li.appendChild(removeButton);
                        selectedList.appendChild(li);
                    });
                }
            });

            // Add page breaks every 900px (approximate)
            const contentHeight = selectedList.offsetHeight;
            const pageHeight = 900; // Roughly 11 inches worth of content
            
            if (contentHeight > pageHeight) {
                const numberOfPages = Math.ceil(contentHeight / pageHeight);
                for (let i = 1; i < numberOfPages; i++) {
                    const pageBreak = document.createElement('div');
                    pageBreak.className = 'page-break';
                    selectedList.insertBefore(pageBreak, selectedList.children[Math.floor(selectedList.children.length * (i/numberOfPages))]);
                }
            }

            // Add page guide
            const pageGuide = document.createElement('div');
            pageGuide.className = 'page-guide';
            pageGuide.textContent = `${Math.ceil(contentHeight / pageHeight)} page${Math.ceil(contentHeight / pageHeight) > 1 ? 's' : ''}`;
            selectedList.parentElement.appendChild(pageGuide);
        }

        async function generatePDF() {
            const projectTitle = document.getElementById('projectTitle').value;
            if (!projectTitle) {
                alert('Please enter a project title before downloading. This helps you identify your PDF later.');
                document.getElementById('projectTitle').focus();  // Focus on the input field
                return;
            }

            if (selectedItemsList.length === 0) {
                alert('Please add some items to your list before saving');
                return;
            }

            // Generate the PDF
            const doc = new jsPDF();
            generatePDFContent(doc);

            // First, save locally
            doc.save(`${projectTitle.replace(/\s+/g, '_')}.pdf`);

            // Then, if user is signed in, save to Google Drive
            try {
                const auth2 = gapi.auth2.getAuthInstance();
                if (auth2 && auth2.isSignedIn.get()) {
                    console.log('Also saving to Google Drive...');
                    const pdfBlob = doc.output('blob');
                    
                    // Convert to base64
                    console.log('Converting to base64...');
                    const base64data = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const result = reader.result.split(',')[1];
                            if (result) {
                                resolve(result);
                            } else {
                                reject(new Error('Failed to convert PDF to base64'));
                            }
                        };
                        reader.onerror = () => reject(reader.error);
                        reader.readAsDataURL(pdfBlob);
                    });
                    
                    // Save to Drive
                    const response = await gapi.client.drive.files.create({
                        resource: {
                            name: `${projectTitle}.pdf`,
                            mimeType: 'application/pdf',
                        },
                        media: {
                            mimeType: 'application/pdf',
                            body: base64data,
                        },
                    });
                    
                    console.log('PDF also saved to Google Drive');
                }
            } catch (error) {
                console.error('Note: Failed to save to Google Drive:', error);
            }
        }

        function savePDFToAccount() {
            // Check if there's a project title
            const projectTitle = document.getElementById('projectTitle').value;
            if (!projectTitle) {
                alert('Please enter a project title before saving');
                return;
            }
            
            const pdfData = {
                title: projectTitle,
                items: selectedItemsList,
                dateCreated: new Date().toISOString()
            };

            try {
                // Get existing saved PDFs or initialize empty array
                let savedPDFs = JSON.parse(localStorage.getItem('savedPDFs') || '[]');
                
                // Add new PDF data
                savedPDFs.push(pdfData);
                
                // Save back to localStorage
                localStorage.setItem('savedPDFs', JSON.stringify(savedPDFs));
                
                alert('PDF saved successfully!');
            } catch (error) {
                console.error('Failed to save PDF:', error);
                alert('Failed to save PDF. Please try again.');
            }
        }

                const user = userCredential.user;
                
                // Save additional user data
                await db.collection('users').doc(user.uid).set({
                    firstName: firstName,

                    createdAt: new Date()

                // Update the savePDFToAccount function to use Firebase

        function signInWithGoogle() {

            console.log('1. Starting Google sign in...');
            const provider = new firebase.auth.GoogleAuthProvider();
            
            // Get page elements right away
            const loginPage = document.getElementById("loginPage");
            const projectPage = document.getElementById("projectPage");
            const sidebar = document.querySelector(".sidebar");
            const mainContent = document.querySelector(".main-content");
            
            firebase.auth().signInWithPopup(provider)
                .then((result) => {
                    console.log('2. Popup completed, user selected');
                    
                    // Initialize project page first
                    sidebar.style.display = "block";
                    mainContent.style.display = "block";
                    projectPage.style.display = "block";
                    
                    // Then start transition
                    loginPage.style.transform = "translateY(-100%)";
                    loginPage.style.opacity = "0";
                    projectPage.style.transform = "translateY(0)";
                    projectPage.style.opacity = "1";
                    
                    // Save to Firestore after transition starts
                    return db.collection('users').doc(result.user.uid).set({
                        email: result.user.email,
                        createdAt: new Date()
                    }, { merge: true });
                })
                .catch((error) => {
                    console.error('Sign in failed:', error);
                    alert('Sign in failed: ' + error.message);
                });

        firebase.auth().onAuthStateChanged((user) => {
            console.log('Auth state changed:', user ? 'User logged in' : 'User logged out');
            const userEmail = document.getElementById('userEmail');

            const loginPage = document.getElementById("loginPage");

                    projectPage.style.transform = "translateY(0)";

            } else {

        async function showSavedPDFs() {
            const listDiv = document.getElementById('savedPDFsList');
            listDiv.innerHTML = '<p>Loading PDFs...</p>';
            document.getElementById('savedPDFsModal').style.display = 'block';
            
            try {
                const auth2 = gapi.auth2.getAuthInstance();
                if (!auth2 || !auth2.isSignedIn.get()) {
                    listDiv.innerHTML = '<p>Please sign in to view your PDFs</p>';
                    return;
                }

                // List files from Google Drive
                const response = await gapi.client.drive.files.list({
                    q: "mimeType='application/pdf'",
                    fields: 'files(id, name, createdTime)',
                    orderBy: 'createdTime desc'
                });

                const files = response.result.files;
                if (files && files.length > 0) {
                    listDiv.innerHTML = '';
                    files.forEach(file => {
                        const pdfDiv = document.createElement('div');
                        pdfDiv.style.margin = '10px 0';
                        pdfDiv.style.padding = '10px';
                        pdfDiv.style.borderBottom = '1px solid #eee';
                        
                        pdfDiv.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span>${file.name}</span>
                                <span style="color: #666; font-size: 0.8em;">
                                    ${new Date(file.createdTime).toLocaleDateString()}
                                </span>
                                <a href="https://drive.google.com/file/d/${file.id}/view" target="_blank">
                                    <button>Open in Drive</button>
                                </a>
                            </div>
                        `;
                        listDiv.appendChild(pdfDiv);
                    });
                } else {
                    listDiv.innerHTML = '<p>No PDFs found</p>';
                }
            } catch (error) {
                console.error('Failed to load PDFs:', error);
                listDiv.innerHTML = '<p>Failed to load PDFs. Please try again.</p>';
            }
        }

        async function saveToGoogleDrive() {
            console.log('Starting Google Drive save...');
            
            try {
                const auth2 = gapi.auth2.getAuthInstance();
                if (!auth2.isSignedIn.get()) {
                    await auth2.signIn();
                }

                const projectTitle = document.getElementById('projectTitle').value;
                if (!projectTitle) {
                    alert('Please enter a project title before saving');
                    return;
                }

                // Generate PDF
                console.log('Generating PDF...');
                const doc = new jsPDF();
                generatePDFContent(doc);
                
                // Convert to blob
                const pdfBlob = doc.output('blob');
                const metadata = {
                    name: `${projectTitle}.pdf`,
                    mimeType: 'application/pdf',
                };

                // Create form data
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
                form.append('file', pdfBlob);

                // Get access token
                const token = gapi.auth2.getAuthInstance().currentUser.get().getAuthResponse().access_token;

                // Upload using fetch
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: new Headers({
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'multipart/form-data'
                    }),
                    body: form
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Upload failed: ${response.status} ${errorText}`);
                }

                const result = await response.json();
                
                if (result.id) {
                    const fileUrl = `https://drive.google.com/file/d/${result.id}/view`;
                    alert(`PDF saved to Google Drive!\nView it here: ${fileUrl}`);
                } else {
                    throw new Error('Failed to get file ID from Google Drive');
                }
            } catch (error) {
                console.error('Drive API Error:', error);
                alert(`Failed to save: ${error.message || 'Please make sure you are signed in'}`);
            }
        }

        // Add this new function to handle PDF content generation
        function generatePDFContent(doc) {
            console.log('Selected Items List:', selectedItemsList);
            
            const projectTitle = document.getElementById('projectTitle').value;
            const margin = 10;
            const maxLineWidth = doc.internal.pageSize.width - (margin * 2);
            
            // Set title
            doc.setFontSize(24);
            doc.setFont(undefined, 'bold');
            doc.text(projectTitle, margin, 20);
            
            let yPosition = 40;
            
            // Group items by category
            const groupedItems = {};
            selectedItemsList.forEach(item => {
                if (!groupedItems[item.category]) {
                    groupedItems[item.category] = [];
                }
                groupedItems[item.category].push(item);
            });
            
            // Add items by category
            Object.keys(groupedItems).forEach(category => {
                const categoryItems = groupedItems[category];
                if (categoryItems.length > 0) {
                    // Add category header in bold
                    doc.setFontSize(16);
                    doc.setFont(undefined, 'bold');
                    
                    if (yPosition > doc.internal.pageSize.height - 20) {
                        doc.addPage();
                        yPosition = 20;
                    }
                    
                    doc.text(category, margin, yPosition);
                    yPosition += 10;
                    
                    // Add items under the category
                    doc.setFontSize(12);
                    doc.setFont(undefined, 'normal');
                    categoryItems.forEach(item => {
                        // Changed format to put quantity in brackets
                        const itemText = `(${item.quantity}x)  ${item.name}`;
                        const lines = doc.splitTextToSize(itemText, maxLineWidth - margin);
                        
                        if (yPosition + (lines.length * 7) > doc.internal.pageSize.height - 10) {
                            doc.addPage();
                            yPosition = 20;
                        }
                        
                        doc.text(lines, margin + 10, yPosition);
                        yPosition += lines.length * 7;
                    });
                    yPosition += 5;
                }
            });
        }

        // Update how items are displayed in the sidebar
        function createItemElement(item, category, zoomType = null) {
            const li = document.createElement('li');
            li.className = 'item';
            li.textContent = item;
            li.onclick = () => addToSelected(item, category);
            
            // Add data attributes for filtering
            li.dataset.category = category;
            if (zoomType) {
                li.dataset.zoomType = zoomType;
            }
            
            return li;
        }
